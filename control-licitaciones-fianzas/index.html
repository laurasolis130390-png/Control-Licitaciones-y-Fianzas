<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Control de Licitaciones y Fianzas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></symbol>
      <symbol id="icon-file" viewBox="0 0 24 24"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/></symbol>
      <symbol id="icon-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-5"/></symbol>
      <symbol id="icon-stamp" viewBox="0 0 24 24"><path d="M7 21h10"/><path d="M8 17h8"/><path d="M10 11a4 4 0 1 1 4 0l1 6H9z"/><path d="M7 21v-4h10v4"/></symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24"><path d="m12 3 10 18H2z"/><path d="M12 9v5"/><path d="M12 17h.01"/></symbol>
      <symbol id="icon-building" viewBox="0 0 24 24"><path d="M4 22V7l8-4 8 4v15"/><path d="M9 22v-5h6v5"/><path d="M8 9h.01"/><path d="M12 9h.01"/><path d="M16 9h.01"/><path d="M8 13h.01"/><path d="M12 13h.01"/><path d="M16 13h.01"/></symbol>
      <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5"/><path d="M12 16V8"/><path d="M16 16v-3"/></symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8 1.7 1.7 0 0 0 1.5 1h.2a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.4 1z"/></symbol>
      <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol>
      <symbol id="icon-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/><path d="M10 19a2 2 0 0 0 4 0"/></symbol>
      <symbol id="icon-log-out" viewBox="0 0 24 24"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 3v18h-7"/></symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></symbol>
      <symbol id="icon-flag" viewBox="0 0 24 24"><path d="M5 22V4"/><path d="M5 4c4-2 7 2 11 0v10c-4 2-7-2-11 0"/></symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
      <symbol id="icon-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></symbol>
    </svg>

    <div class="dashboard-shell">
      <aside class="sidebar" aria-label="Navegacion principal">
        <div class="brand">
          <div class="brand-mark">
            <span></span>
          </div>
          <div>
            <strong>Control de</strong>
            <strong>Licitaciones y Fianzas</strong>
          </div>
        </div>

        <nav class="nav-list" id="moduleNav"></nav>

        <div class="profile-card">
          <div class="avatar"><svg><use href="#icon-user"></use></svg></div>
          <div>
            <strong>Laura Solis</strong>
            <span>Administradora</span>
          </div>
          <button class="icon-button compact" type="button" aria-label="Abrir perfil">
            <svg><use href="#icon-chevron"></use></svg>
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>¡Bienvenida, Laura!</h1>
            <p>Aqui tienes el resumen general de tus pendientes y licitaciones.</p>
          </div>
          <div class="top-actions">
            <label class="search-box">
              <span class="sr-only">Buscar</span>
              <input type="search" placeholder="Buscar licitacion, fianza, dependencia..." />
              <svg><use href="#icon-search"></use></svg>
            </label>
            <button class="icon-button has-badge" type="button" aria-label="Notificaciones">
              <svg><use href="#icon-bell"></use></svg>
              <span id="notificationCount">0</span>
            </button>
            <button class="icon-button" type="button" aria-label="Salir">
              <svg><use href="#icon-log-out"></use></svg>
            </button>
          </div>
        </header>

        <div id="viewRoot"></div>

        <footer>Control de Licitaciones y Fianzas © 2026 <span></span> Todos los derechos reservados</footer>
      </main>
    </div>

    <script src="./supabase-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
